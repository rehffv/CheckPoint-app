<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CheckPoint</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #141418;
      --card:      #1a1a22;
      --border:    #2a2a3a;
      --lilac:     #b48ef0;
      --violet:    #7c3aed;
      --violet2:   #6d28d9;
      --muted:     #52526a;
      --text:      #e8e8f0;
      --subtext:   #8888a8;
      --danger:    #f87171;
      --success:   #6ee7b7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,58,237,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(180,142,240,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    header { margin-bottom: 48px; animation: fadeDown 0.6s ease both; }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--lilac), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline { color: var(--subtext); font-size: 0.92rem; margin-top: 4px; font-weight: 300; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      flex: 1;
      text-align: center;
    }

    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--lilac); }
    .stat-label { font-size: 0.75rem; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
      animation: fadeDown 0.6s 0.15s ease both;
    }

    .form-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.full { grid-template-columns: 1fr; }

    input, textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(1) saturate(3) hue-rotate(220deg);
      cursor: pointer;
    }

    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 72px; }
    select option { background: var(--surface); }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 12px 24px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--violet), var(--violet2));
      color: #fff;
      width: 100%;
      margin-top: 4px;
    }

    .btn-primary:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124,58,237,0.35);
    }

    .btn-primary:active { transform: translateY(0); }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeDown 0.6s 0.2s ease both;
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--subtext);
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--violet); color: var(--lilac); }
    .filter-btn.active { background: rgba(124,58,237,0.18); border-color: var(--violet); color: var(--lilac); }
    
    #task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: slideIn 0.3s ease both;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .task-item.alta::before  { background: #f87171; }
    .task-item.media::before { background: var(--lilac); }
    .task-item.baixa::before { background: var(--success); }

    .task-item:hover { border-color: var(--violet); transform: translateX(3px); }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--subtext); }

    .task-item.vencida:not(.done) {
      border-color: var(--danger);
      animation: slideIn 0.3s ease both, pulseRed 2s infinite;
    }

    @keyframes pulseRed {
      0%, 100% { border-color: rgba(248,113,113,0.4); }
      50%       { border-color: rgba(248,113,113,1); }
    }

    .task-check {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .task-check:hover { border-color: var(--violet); }
    .task-check.checked { background: var(--violet); border-color: var(--violet); }
    .task-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: bold; }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.98rem;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-desc { font-size: 0.83rem; color: var(--subtext); margin-bottom: 8px; line-height: 1.4; }
    .task-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .badge {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge.alta  { background: rgba(248,113,113,0.15); color: #f87171; }
    .badge.media { background: rgba(180,142,240,0.15); color: var(--lilac); }
    .badge.baixa { background: rgba(110,231,183,0.15); color: var(--success); }

    .task-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .task-timer {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      white-space: nowrap;
    }

    .task-timer.ativo   { background: rgba(180,142,240,0.15); color: var(--lilac); }
    .task-timer.urgente { background: rgba(251,146,60,0.2);   color: #fb923c; }
    .task-timer.vencido { background: rgba(248,113,113,0.3);  color: var(--danger); }
    .task-timer.ok      { background: rgba(110,231,183,0.15); color: var(--success); }

    .task-actions { display: flex; gap: 6px; }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--subtext);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .icon-btn:hover.edit { border-color: var(--lilac); color: var(--lilac); background: rgba(180,142,240,0.1); }
    .icon-btn:hover.del  { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }

    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      margin: 24px;
      animation: modalIn 0.25s ease;
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--lilac);
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--subtext); flex: 1; }
    .btn-secondary:hover { border-color: var(--violet); color: var(--text); }
    .btn-save { background: linear-gradient(135deg, var(--violet), var(--violet2)); color: #fff; flex: 2; }
    .btn-save:hover { filter: brightness(1.15); }

    .empty { text-align: center; padding: 60px 20px; color: var(--subtext); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    .empty p { font-size: 0.9rem; }

    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--violet);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.88rem;
      color: var(--text);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 200;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      .container { padding: 32px 16px 60px; }
      .logo { font-size: 1.6rem; }
      .tagline { font-size: 0.85rem; }
      .stats { gap: 8px; }
      .stat { padding: 10px 8px; }
      .stat-num { font-size: 1.2rem; }
      .stat-label { font-size: 0.68rem; }
      .form-card { padding: 20px 16px; }
      .form-row { grid-template-columns: 1fr; }
      .task-item { padding: 14px 12px; }
      .task-title { font-size: 0.9rem; }
    }
  </style>
</head>

<body>

<div class="container">
  <header>
    <div class="logo">CheckPoint</div>
    <div class="tagline">Suas tarefas, organizadas com estilo.</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="stat-pendentes">0</div><div class="stat-label">Pendentes</div></div>
    <div class="stat"><div class="stat-num" id="stat-concluidas">0</div><div class="stat-label">Concluídas</div></div>
  </div>

  <div class="form-card">
    <h2>Nova Tarefa</h2>
    <div class="form-row">
      <input type="text" id="input-titulo" placeholder="Título da tarefa *" />
      <select id="input-prioridade">
        <option value="baixa">🟢 Prioridade Baixa</option>
        <option value="media" selected>🟣 Prioridade Média</option>
        <option value="alta">🔴 Prioridade Alta</option>
      </select>
    </div>
    <div class="form-row">
      <textarea id="input-descricao" placeholder="Descrição (opcional)"></textarea>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.08em">⏱ Prazo (opcional)</label>
        <input type="datetime-local" id="input-prazo" />
      </div>
    </div>
    <button class="btn btn-primary" onclick="criarTarefa()">＋ Adicionar Tarefa</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todas', this)">Todas</button>
    <button class="filter-btn" onclick="filtrar('pendentes', this)">Pendentes</button>
    <button class="filter-btn" onclick="filtrar('concluidas', this)">Concluídas</button>
    <button class="filter-btn" onclick="filtrar('alta', this)">🔴 Alta</button>
    <button class="filter-btn" onclick="filtrar('media', this)">🟣 Média</button>
    <button class="filter-btn" onclick="filtrar('baixa', this)">🟢 Baixa</button>
    <button class="filter-btn" onclick="filtrar('vencidas', this)">⏰ Vencidas</button>
  </div>

  <div id="task-list"></div>
</div>

<!-- Modal de edição -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Editar Tarefa</h2>
    <input type="hidden" id="edit-id" />
    <div class="form-row full" style="margin-bottom:12px">
      <input type="text" id="edit-titulo" placeholder="Título *" />
    </div>
    <div class="form-row full" style="margin-bottom:12px">
      <textarea id="edit-descricao" placeholder="Descrição"></textarea>
    </div>
    <div class="form-row" style="margin-bottom:0">
      <select id="edit-prioridade">
        <option value="baixa">🟢 Prioridade Baixa</option>
        <option value="media">🟣 Prioridade Média</option>
        <option value="alta">🔴 Prioridade Alta</option>
      </select>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:0.78rem;color:var(--subtext);text-transform:uppercase;letter-spacing:0.08em">⏱ Prazo</label>
        <input type="datetime-local" id="edit-prazo" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-save" onclick="salvarEdicao()">Salvar alterações</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://checkpoint-app-w7ue.onrender.com';
//  const API = 'http://localhost:8080';
  let todasTarefas = [];
  let filtroAtual = 'todas';
  let timerInterval = null;

  async function carregarTarefas() {
    try {
      const res = await fetch(`${API}/tasks`);
      const data = await res.json();
      todasTarefas = data.tasks || [];
      renderizar();
      atualizarStats();
    } catch (e) {
      mostrarToast('Erro ao conectar com o servidor!');
    }
  }

  function atualizarStats() {
    const total = todasTarefas.length;
    const concluidas = todasTarefas.filter(t => t.concluida).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-pendentes').textContent = total - concluidas;
    document.getElementById('stat-concluidas').textContent = concluidas;
  }

  function filtrar(tipo, btn) {
    filtroAtual = tipo;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderizar();
  }

  function calcularTimer(prazo, concluida) {
    if (!prazo) return null;
    const agora = new Date();
    const fim   = new Date(prazo);
    const diff  = fim - agora;

    if (concluida && diff >= 0) return { texto: '✓ No prazo', classe: 'ok' };
    if (concluida && diff < 0)  return { texto: '✗ Atrasado', classe: 'vencido' };
    if (diff <= 0) return { texto: '⏰ Prazo vencido!', classe: 'vencido' };

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    if (h < 1)  return { texto: `⚠ ${m}m ${s}s restantes`, classe: 'urgente' };
    if (h < 24) return { texto: `⏱ ${h}h ${m}m restantes`, classe: 'urgente' };

    const d = Math.floor(h / 24);
    return { texto: `⏱ ${d}d ${h % 24}h restantes`, classe: 'ativo' };
  }

  function estaVencida(t) {
    if (!t.prazo) return false;
    return new Date(t.prazo) < new Date();
  }

  function renderizar() {
    if (timerInterval) clearInterval(timerInterval);

    let lista = [...todasTarefas];
    if (filtroAtual === 'pendentes')  lista = lista.filter(t => !t.concluida);
    if (filtroAtual === 'concluidas') lista = lista.filter(t => t.concluida);
    if (filtroAtual === 'alta')       lista = lista.filter(t => t.prioridade === 'alta');
    if (filtroAtual === 'media')      lista = lista.filter(t => t.prioridade === 'media');
    if (filtroAtual === 'baixa')      lista = lista.filter(t => t.prioridade === 'baixa');
    if (filtroAtual === 'vencidas')   lista = lista.filter(t => estaVencida(t));

    const container = document.getElementById('task-list');

    if (lista.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="empty-icon">✦</div>
          <p>Nenhuma tarefa aqui ainda.</p>
        </div>`;
      return;
    }

      container.innerHTML = lista.map(t => {
      const vencida = estaVencida(t);
      const timer = calcularTimer(t.prazo, t.concluida);
      const timerHtml = timer ? `
        <div class="task-timer ${timer.classe}">
          ${timer.texto}
        </div>` : '';
      return `
        <div class="task-item ${t.prioridade} ${t.concluida ? 'done' : ''} ${vencida ? 'vencida' : ''}" id="task-${t.taskId}">
          <div class="task-check ${t.concluida ? 'checked' : ''}" onclick="toggleConcluida(${t.taskId}, ${!t.concluida}, '${escapar(t.titulo)}', '${escapar(t.descricao || '')}', '${t.prioridade}', '${t.prazo || ''}')"></div>
          <div class="task-body">
            <div class="task-title">${escaparHtml(t.titulo)}</div>
            ${t.descricao ? `<div class="task-desc">${escaparHtml(t.descricao)}</div>` : ''}
            <div class="task-meta">
              <span class="badge ${t.prioridade}">${t.prioridade}</span>
            </div>
          </div>
          <div class="task-right">
            <div class="task-actions">
              <button class="icon-btn edit" onclick="abrirModal(${t.taskId})" title="Editar">✎</button>
              <button class="icon-btn del" onclick="deletarTarefa(${t.taskId})" title="Deletar">✕</button>
            </div>
            ${timerHtml}
          </div>
        </div>`;
    }).join('');

    const tarefasComPrazo = lista.filter(t => t.prazo && !t.concluida);
    if (tarefasComPrazo.length > 0) {
      timerInterval = setInterval(() => {
        tarefasComPrazo.forEach(t => {
          const el = document.querySelector(`[data-taskid="${t.taskId}"]`);
          if (!el) return;
          const timer = calcularTimer(t.prazo, t.concluida);
          if (timer) {
            el.textContent = timer.texto;
            el.className = `timer-badge ${timer.classe}`;
          }
          const card = document.getElementById(`task-${t.taskId}`);
          if (card) {
            if (estaVencida(t)) card.classList.add('vencida');
            else card.classList.remove('vencida');
          }
        });
      }, 1000);
    }
  }

  async function criarTarefa() {
    const titulo = document.getElementById('input-titulo').value.trim();
    if (!titulo) { mostrarToast('O título é obrigatório!'); return; }

    const prazoVal = document.getElementById('input-prazo').value;
    const tarefa = {
      taskId: null,
      titulo,
      descricao: document.getElementById('input-descricao').value.trim() || null,
      prioridade: document.getElementById('input-prioridade').value,
      concluida: false,
      prazo: prazoVal || null
    };

    try {
      const res = await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tarefa)
      });
      if (res.ok) {
        document.getElementById('input-titulo').value = '';
        document.getElementById('input-descricao').value = '';
        document.getElementById('input-prazo').value = '';
        mostrarToast('Tarefa criada!');
        carregarTarefas();
      }
    } catch (e) { mostrarToast('Erro ao criar tarefa!'); }
  }

  async function toggleConcluida(id, concluida, titulo, descricao, prioridade, prazo) {
    try {
      await fetch(`${API}/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId: id, titulo, descricao: descricao || null, prioridade, concluida, prazo: prazo || null })
      });
      carregarTarefas();
    } catch (e) { mostrarToast('Erro ao atualizar tarefa!'); }
  }

  async function deletarTarefa(id) {
    try {
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      mostrarToast('Tarefa removida!');
      carregarTarefas();
    } catch (e) { mostrarToast('Erro ao deletar!'); }
  }

  function abrirModal(id) {
    const t = todasTarefas.find(x => x.taskId === id);
    if (!t) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-titulo').value = t.titulo;
    document.getElementById('edit-descricao').value = t.descricao || '';
    document.getElementById('edit-prioridade').value = t.prioridade;
    document.getElementById('edit-prazo').value = t.prazo || '';
    document.getElementById('modal').classList.add('open');
  }

  function fecharModal() {
    document.getElementById('modal').classList.remove('open');
  }

  async function salvarEdicao() {
    const id = parseInt(document.getElementById('edit-id').value);
    const titulo = document.getElementById('edit-titulo').value.trim();
    if (!titulo) { mostrarToast('O título é obrigatório!'); return; }

    const t = todasTarefas.find(x => x.taskId === id);
    const prazoVal = document.getElementById('edit-prazo').value;
    const tarefa = {
      taskId: id,
      titulo,
      descricao: document.getElementById('edit-descricao').value.trim() || null,
      prioridade: document.getElementById('edit-prioridade').value,
      concluida: t ? t.concluida : false,
      prazo: prazoVal || null
    };

    try {
      await fetch(`${API}/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tarefa)
      });
      fecharModal();
      mostrarToast('Tarefa atualizada!');
      carregarTarefas();
    } catch (e) { mostrarToast('Erro ao salvar!'); }
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function escaparHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapar(str) {
    return (str || '').replace(/'/g,"\\'").replace(/"/g,'\\"');
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  carregarTarefas();
</script>
</body>
</html>
